train:
  # Pre-trained encoder backbone (any HuggingFace sentence-transformer works)
  base_model: "sentence-transformers/paraphrase-MiniLM-L3-v2"

  # Set to 1 to predict the NEXT trading day's move (more realistic for trading)
  target_lag_days: 1

  epochs: 3
  # Physical batch size per device step. Keep small on MPS to stay within VRAM.
  # Effective batch = batch_size × grad_accum.
  batch_size: 512
  grad_accum: 4   # accumulate gradients over N micro-batches before stepping
  lr: 2e-5
  max_length: 32
  val_ratio: 0.2

  # Set to an integer (e.g. 50000) for a quick smoke-test run; null = use all data
  max_samples: 200_000

  # ---- thermal / resource limits ----
  # UNIX nice value (0–19): higher = lower scheduling priority, cooler machine.
  nice: 10
  # Max CPU threads for PyTorch ops. M4 has 10 cores; 4 keeps things cool.
  num_threads: 4

populate_lancedb:
  table_name: "headlines"
  db_uri: 'lance/' #"s3://shockchain/lance/" # lance/ for local testing
  aws_profile: "shockchain"
  # Inference has no gradients/optimiser state, so this can be much larger than
  # the training batch_size. 1024 is a safe starting point on MPS;
  # push to 2048 if VRAM allows.
  encode_batch_size: 1024

ethics:
  headlines_excluded_keywords:
  - war
  - conflict
  - crisis
  - earthquake
  - hurricane
  - flood
  - pandemic
  - death
