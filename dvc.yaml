stages:
  extract:
    foreach:
      - sp500_targets
      - news_headlines
    do:
      cmd:
        - mkdir -p data
        - python -m src.extract --output ${item}
      outs:
        - data/${item}.parquet

  train:
    cmd: python -m src.finetune_headline_encoder --headlines data/news_headlines.parquet --targets data/sp500_targets.parquet --output models
    deps:
      - data/news_headlines.parquet
      - data/sp500_targets.parquet
      - src/finetune_headline_encoder.py
    params:
      - params.yaml:
          - train
    outs:
      - models/headline_classifier.pt

  populate_lancedb:
    cmd:
      - mkdir -p lance
      - python -m src.populate_lancedb --headlines data/news_headlines.parquet --checkpoint models/headline_classifier.pt --output lance
    deps:
      - models/headline_classifier.pt
      - data/news_headlines.parquet
    params:
      - params.yaml:
          - populate_lancedb
    outs:
      - lance/
