stages:
  extract:
    foreach:
      - sp500_targets
      - news_headlines
    do:
      cmd:
        - mkdir -p data
        - python -m src.extract --output ${item}
      outs:
        - data/${item}.parquet

  train:
    cmd: python -m src.finetune_headline_encoder --headlines data/news_headlines.parquet --targets data/sp500_targets.parquet --output models
    deps:
      - data/news_headlines.parquet
      - data/sp500_targets.parquet
      - src/finetune_headline_encoder.py
    params:
      - params.yaml:
          - train
    outs:
      - models/headline_classifier.pt

  populate_lancedb:
    cmd: python -m src.populate_lancedb --headlines data/news_headlines.parquet --checkpoint models/headline_classifier.pt
    deps:
      - models/headline_classifier.pt
      - data/news_headlines.parquet
      - src/populate_lancedb.py
    outs:
      - lance/headlines.lance
    params:
      - params.yaml:
          - populate_lancedb
    # Output lives in S3 (db_uri from params.yaml) — not tracked by DVC cache.


  find_closests_scenarios:
    cmd: python -m src.duckdb_vector_search "SELECT * FROM lance_vector_search('lance/headlines.lance', 'vector', embed('my scenario'), k=5)"
    deps:
      - lance/headlines.lance
      - models/headline_classifier.pt
      - src/duckdb_vector_search.py
